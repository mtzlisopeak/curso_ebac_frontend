<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Formulário</title>
</head>
<body>
  
  <div class="container">
    <form>
      <h2>Create account</h2>

      <label class="form-label" for="name">Name:</label>
      <input class="form-control" type="text" name="name" placeholder="Your name">

      <label class="form-label"  for="email">E-mail:</label>
      <input class="form-control" type="email" name="email" placeholder="E-mail">

      <label class="form-label"  for="number">Phone number:</label>
      <input class="form-control" type="text" name="number" id="number" placeholder="Phone number (optional)">

      <div class="form-check">
        <input class="form-check-input" type="checkbox" name="terms">
        <label class="form-check-label" for="terms">I accept the 
          <a href="#">terms and conditions</a>.
        </label>

        <input class="form-check-input" type="checkbox" id="updates">
        <label class="form-check-label" for="updates">i want to receive updates by email.</label>
      </div>

      <button class="btn btn-primary" type="submit">Create</button>
    </form>
  </div>

  <footer>
    <p>2024 - mtzlisopeak</p>
  </footer>

<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
<script src="jquery-plugins/jquery.validate.min.js"></script>
<script src="jquery-plugins/jquery.mask.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
