<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css">
  <title>Formulário</title>
</head>
<body>
  
  <div class="container">

    <form>

      <h2>Create account</h2>

      <label class="form-label" for="name">Name:</label>
      <input class="form-control" type="text" id="name" placeholder="Your name">

      <label class="form-label" for="email">E-mail:</label>
      <input class="form-control" type="email" id="email" placeholder="E-mail">

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="terms">
        <label class="form-check-label" for="terms">I accept the 
          <a href="">terms and conditions</a>.
        </label>
      </div>

      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="updates">
        <label class="form-check-label" for="updates">I agree to receive updates by email.</label>
      </div>

      <button class="btn btn-primary" type="submit">Create</button>

    </form>

  </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
